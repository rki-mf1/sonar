name: publish deploy bundle
on:
  pull_request:
    paths:
      - ".github/workflows/publish-deploy-bundle.yml"
      - "example-deploy/**"
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - ".github/workflows/publish-deploy-bundle.yml"
      - "example-deploy/**"
  workflow_dispatch:
jobs:
  bundle:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Create bundle archive
        run: |
          mkdir -p dist
          tar -czf dist/sonar-ghcr-deploy-bundle.tar.gz example-deploy
      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: sonar-ghcr-deploy-bundle
          path: dist/sonar-ghcr-deploy-bundle.tar.gz
      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          files: dist/sonar-ghcr-deploy-bundle.tar.gz
