name: Frontend E2E Playwright Tests
on:
  pull_request:
    paths:
      - 'VERSION'
      - 'scripts/sync-version.py'
      - 'apps/backend/**'
      - 'apps/frontend/**'
  workflow_dispatch:
jobs:
  playwright-e2e:
    timeout-minutes: 20
    runs-on: ubuntu-latest
    env:
      PLAYWRIGHT_BASE_URL: http://127.0.0.1:8000
      SONAR_LOCAL_API_URL: http://127.0.0.1:8000/api/
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
      - name: Check synchronized versions
        run: python scripts/sync-version.py --check
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: apps/frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: ./apps/frontend
        run: npm ci
      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-firefox-${{ hashFiles('apps/frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-firefox-
      - name: Install Playwright system dependencies
        working-directory: ./apps/frontend
        run: ./node_modules/.bin/playwright install-deps firefox
      - name: Install Playwright Firefox
        working-directory: ./apps/frontend
        timeout-minutes: 10
        run: ./node_modules/.bin/playwright install firefox
      - name: Set backend API url
        working-directory: ./apps/frontend
        run: |
          echo "VITE_SONAR_BACKEND_ADDRESS=\"${SONAR_LOCAL_API_URL}\"" >> .env.production.local
          echo "VITE_SONAR_VERSION=\"$(cat ../../VERSION)\"" >> .env.production.local
      - name: Build frontend
        working-directory: ./apps/frontend
        run: npm run build:backend-proxy
      - name: Start backend containers
        working-directory: ./apps/backend
        run: ./scripts/linux/clean-dev-env.sh
      - name: See if the web server is responding
        run: curl "${PLAYWRIGHT_BASE_URL}"
      - name: Run Playwright tests (Firefox only)
        working-directory: ./apps/frontend
        run: npx playwright test --project firefox
      - uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: ./apps/frontend/playwright-report/
          retention-days: 30
