name: publish container images
on:
  pull_request:
    paths:
      - ".github/workflows/build-image.yml"
      - "apps/backend/**"
      - "apps/cli/**"
      - "apps/frontend/**"
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - ".github/workflows/build-image.yml"
      - "apps/backend/**"
      - "apps/cli/**"
      - "apps/frontend/**"
  workflow_dispatch:
jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: backend
            context: ./apps/backend
            dockerfile: ./apps/backend/Dockerfile
            image: ghcr.io/${{ github.repository_owner }}/sonar-backend
          - component: frontend
            context: ./apps/frontend
            dockerfile: ./apps/frontend/Dockerfile
            image: ghcr.io/${{ github.repository_owner }}/sonar-frontend
          - component: cli
            context: ./apps/cli
            dockerfile: ./apps/cli/Dockerfile
            image: ghcr.io/${{ github.repository_owner }}/sonar-cli
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Verify release tag is on main
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          git fetch --no-tags origin main:refs/remotes/origin/main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" refs/remotes/origin/main; then
            echo "::error::Release tag ${GITHUB_REF_NAME} must point to a commit that has been merged into main"
            exit 1
          fi
      - name: Resolve product version
        id: product-version
        shell: bash
        run: |
          file_version="$(tr -d '[:space:]' < VERSION)"
          if [[ -z "$file_version" ]]; then
            echo "::error::VERSION is empty"
            exit 1
          fi

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            tag_version="${GITHUB_REF_NAME#v}"
            if [[ "$tag_version" != "$file_version" ]]; then
              echo "::error::Git tag ${GITHUB_REF_NAME} does not match VERSION ${file_version}"
              exit 1
            fi
            version="$tag_version"
          else
            version="$file_version"
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Log in to GHCR
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ matrix.image }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=ref,event=pr,prefix=pr-
            type=ref,event=tag
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
      - name: Build and push PR image
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ matrix.image }}:sha-${{ github.sha }}
            ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            SONAR_VERSION=${{ steps.product-version.outputs.version }}
          cache-from: type=gha,scope=${{ matrix.component }}
          cache-to: type=gha,mode=max,scope=${{ matrix.component }}
      - name: Build PR image for validation only
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          tags: |
            ${{ matrix.image }}:sha-${{ github.sha }}
            ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            SONAR_VERSION=${{ steps.product-version.outputs.version }}
          outputs: type=cacheonly
          cache-from: type=gha,scope=${{ matrix.component }}
          cache-to: type=gha,mode=max,scope=${{ matrix.component }}
      - name: Build and push image
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ matrix.image }}:sha-${{ github.sha }}
            ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            SONAR_VERSION=${{ steps.product-version.outputs.version }}
          cache-from: type=gha,scope=${{ matrix.component }}
          cache-to: type=gha,mode=max,scope=${{ matrix.component }}
