version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      all-security:
        applies-to: security-updates
        patterns:
          - "*"
      all-versions:
        applies-to: version-updates
        patterns:
          - "*"
  - package-ecosystem: "pip"
    directory: "/apps/backend"
    schedule:
      interval: "weekly"
    groups:
      all-security:
        applies-to: security-updates
        patterns:
          - "*"
      backend-python:
        applies-to: version-updates
        patterns:
          - "*"
